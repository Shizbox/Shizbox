<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pDAI | SENTINEL V4.4</title>
    <style>
        :root { 
            --neon: #00ff41; --ammo: #00d4ff; --burn: #ff3e3e; --bg: #020202; 
            --glass: rgba(255, 255, 255, 0.04); --border: rgba(0, 255, 65, 0.2); 
        }
        body { 
            background-color: var(--bg); color: var(--neon); font-family: 'Consolas', monospace; 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; 
        }
        .terminal-frame { 
            width: 95%; max-width: 1300px; background: var(--glass); backdrop-filter: blur(25px); 
            border: 1px solid var(--border); border-radius: 8px; padding: 25px; box-shadow: 0 0 50px #000;
        }
        header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .card { background: rgba(0,0,0,0.6); border: 1px solid var(--border); padding: 15px; border-radius: 4px; }
        .label { font-size: 0.6rem; text-transform: uppercase; color: #888; margin-bottom: 8px; letter-spacing: 1px; }
        .value { font-size: 1.4rem; color: #fff; }
        .ammo-text { color: var(--ammo); text-shadow: 0 0 5px var(--ammo); }
        .burn-text { color: var(--burn); text-shadow: 0 0 5px var(--burn); }
        .peg-zone { margin-top: 20px; border: 1px solid var(--border); padding: 20px; background: rgba(0,255,65,0.02); }
        .progress-bar { width: 100%; height: 4px; background: #111; margin: 15px 0; position: relative; }
        .progress-fill { height: 100%; background: var(--neon); width: 0%; transition: width 1s; box-shadow: 0 0 10px var(--neon); }
        footer { margin-top: 20px; font-size: 0.6rem; color: #333; display: flex; justify-content: space-between; }
        @keyframes blink { 50% { opacity: 0; } }
        .cursor { display: inline-block; width: 8px; height: 15px; background: var(--neon); animation: blink 1s infinite; }
    </style>
</head>
<body>

<div class="terminal-frame">
    <header>
        <div><strong>pDAI SENTINEL</strong> <span class="cursor"></span></div>
        <div id="sync-status" style="font-size: 0.7rem;">SYNCING...</div>
    </header>

    <div class="data-grid">
        <div class="card">
            <div class="label">Total Supply</div>
            <div id="val-supply" class="value">---</div>
        </div>
        <div class="card">
            <div class="label">Vaporized (Burned)</div>
            <div id="val-burned" class="value burn-text">---</div>
        </div>
        <div class="card">
            <div class="label">Market Price (PLS)</div>
            <div id="val-price" class="value" style="color: #ffcc00;">---</div>
        </div>
        <div class="card">
            <div class="label">Reserve Ammo</div>
            <div id="val-ammo" class="value ammo-text">---</div>
        </div>
        <div class="card">
            <div class="label">Spine (5EF7)</div>
            <div id="val-spine" class="value">---</div>
        </div>
        <div class="card">
            <div class="label">Pool Pressure</div>
            <div id="val-pool-wpls" class="value">---</div>
        </div>
    </div>

    <div class="peg-zone">
        <div style="display: flex; justify-content: space-between;">
            <div>
                <div class="label">Peg Saturation</div>
                <div id="val-peg-percent" style="font-size: 2rem;">0.0000%</div>
            </div>
            <div style="text-align: right;">
                <div class="label">Machine Ratio</div>
                <div id="val-ratio" style="color: var(--ammo);">Coverage: 0.00x</div>
            </div>
        </div>
        <div class="progress-bar"><div id="peg-fill" class="progress-fill"></div></div>
        <div id="status-msg" style="font-size: 0.7rem; color: #666;">MONITORING ON-CHAIN CONTRACTS...</div>
    </div>

    <footer>
        <div id="node-info">NODE: v4.4-STABLE</div>
        <div>CONTRACT: 0x6B175474E89094C44Da98b954EedeAC495271d0F</div>
    </footer>
</div>

<script>
    const RPC = "https://pulsechain-rpc.publicnode.com";
    const PDAI = "0x6B175474E89094C44Da98b954EedeAC495271d0F";
    const WPLS = "0xA1077a294d2D00ca00bb46556459739d482282c6";
    const ADDR = {
        DEAD: "0x000000000000000000000000000000000000dEaD",
        SPINE: "0x5EF786D22e6e6666666666666666666666665EF7",
        POOL: "0xE5604367AD2C51604811568b1a0eAcbdc1DE0aE"
    };

    async function call(to, data) {
        const r = await fetch(RPC, {
            method: 'POST',
            body: JSON.stringify({jsonrpc:"2.0", id:1, method:"eth_call", params:[{to, data}, "latest"]})
        });
        const d = await r.json();
        return BigInt(d.result || 0) / BigInt(10**18);
    }

    async function update() {
        try {
            const supply = await call(PDAI, "0x18160ddd");
            const burned = await call(PDAI, "0x70a08231000000000000000000000000" + ADDR.DEAD.substring(2));
            const spine = await call(PDAI, "0x70a08231000000000000000000000000" + ADDR.SPINE.substring(2));
            const ammo = await call(WPLS, "0x70a08231000000000000000000000000" + ADDR.SPINE.substring(2));
            const pDAIPool = await call(PDAI, "0x70a08231000000000000000000000000" + ADDR.POOL.substring(2));
            const wPLSPool = await call(WPLS, "0x70a08231000000000000000000000000" + ADDR.POOL.substring(2));

            // Price Calc (PLS per pDAI)
            const price = pDAIPool > 0n ? Number(wPLSPool) / Number(pDAIPool) : 0;
            const coverage = wPLSPool > 0n ? Number(ammo) / Number(wPLSPool) : 0;
            const pegProgress = supply > 0n ? (Number(spine + burned) / Number(supply)) * 100 : 0;

            document.getElementById('val-supply').innerText = Number(supply).toLocaleString();
            document.getElementById('val-burned').innerText = Number(burned).toLocaleString();
            document.getElementById('val-price').innerText = price.toFixed(4) + " PLS";
            document.getElementById('val-ammo').innerText = Number(ammo).toLocaleString() + " PLS";
            document.getElementById('val-spine').innerText = Number(spine).toLocaleString();
            document.getElementById('val-pool-wpls').innerText = Number(wPLSPool).toLocaleString() + " PLS";
            
            document.getElementById('val-ratio').innerText = `Coverage: ${coverage.toFixed(2)}x`;
            document.getElementById('val-peg-percent').innerText = pegProgress.toFixed(4) + "%";
            document.getElementById('peg-fill').style.width = pegProgress + "%";
            
            document.getElementById('sync-status').innerText = "LAST SYNC: " + new Date().toLocaleTimeString();
            document.getElementById('status-msg').innerText = coverage >= 1 ? "MATHEMATICAL PEG POSSIBLE" : "ACCUMULATING AMMO...";
        } catch (e) {
            document.getElementById('sync-status').innerText = "RPC ERROR - RETRYING";
        }
    }

    setInterval(update, 10000);
    update();
</script>
</body>
</html>
