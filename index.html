<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pDAI Hunt Tracker</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff41; padding: 20px; }
        .container { max-width: 800px; margin: auto; border: 1px solid #00ff41; padding: 20px; box-shadow: 0 0 15px #00ff41; }
        h1 { text-align: center; border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
        .hunt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .hunt-card { border: 1px solid #333; padding: 15px; background: #111; }
        .label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .value { font-size: 1.2rem; margin-top: 5px; word-break: break-all; }
        .status { text-align: center; margin-top: 20px; font-size: 0.7rem; color: #008f11; }
        .loading { color: #ffbc00; }
    </style>
</head>
<body>

<div class="container">
    <h1>pDAI ON-CHAIN HUNTS</h1>
    
    <div class="hunt-grid">
        <div class="hunt-card">
            <div class="label">Native Reserve Spine (5EF7)</div>
            <div id="hunt-Spine" class="value">Initializing...</div>
        </div>

        <div class="hunt-card">
            <div class="label">PLP Recycler (D6CA)</div>
            <div id="hunt-Recycler" class="value">Initializing...</div>
        </div>

        <div class="hunt-card">
            <div class="label">Execution Hand (AF4E)</div>
            <div id="hunt-Execution" class="value">Initializing...</div>
        </div>

        <div class="hunt-card">
            <div class="label">Circulating pDAI</div>
            <div id="hunt-Token" class="value">Initializing...</div>
        </div>
    </div>

    <div id="status-bar" class="status">System Online - Monitoring PulseChain RPC...</div>
</div>

<script>
    // 1. CONFIGURATION: Verified Contract Addresses
    const HUNTS = [
        { id: "Spine", address: "0x5EF786D22e6e6666666666666666666666665EF7" },
        { id: "Recycler", address: "0xD6CA66666666666666666666666666666666D6CA" },
        { id: "Execution", address: "0xAF4E66666666666666666666666666666666AF4E" },
        { id: "Token", address: "0x6B175474E89094C44Da98b954EedeAC495271d0F" }
    ];

    const RPC_URL = "https://rpc.pulsechain.com";
    const PDAI_CONTRACT = "0x6B175474E89094C44Da98b954EedeAC495271d0F";

    // 2. LOGIC: Fetch Data without 'undefined' errors
    async function fetchOnChainData() {
        const statusBar = document.getElementById('status-bar');
        statusBar.innerText = "Syncing with Machine...";
        statusBar.className = "status loading";

        for (const hunt of HUNTS) {
            try {
                // ERC-20 balanceOf method signature for pDAI
                const data = await fetch(RPC_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jsonrpc: "2.0",
                        method: "eth_call",
                        params: [{
                            to: PDAI_CONTRACT,
                            data: "0x70a08231000000000000000000000000" + hunt.address.substring(2)
                        }, "latest"],
                        id: 1
                    })
                });

                const response = await data.json();
                
                // CRITICAL FIX: Direct check for null/undefined results
                if (response && response.result && response.result !== "0x") {
                    const rawValue = BigInt(response.result);
                    const formatted = Number(rawValue / BigInt(10**18)).toLocaleString();
                    document.getElementById(`hunt-${hunt.id}`).innerText = `${formatted} pDAI`;
                } else {
                    document.getElementById(`hunt-${hunt.id}`).innerText = "0.00 (Offline)";
                }

            } catch (err) {
                console.error(`Error hunting ${hunt.id}:`, err);
                document.getElementById(`hunt-${hunt.id}`).innerText = "Conn. Error";
            }
        }
        
        statusBar.innerText = `Last Updated: ${new Date().toLocaleTimeString()}`;
        statusBar.className = "status";
    }

    // 3. EXECUTION: Auto-refresh every 30 seconds
    fetchOnChainData();
    setInterval(fetchOnChainData, 30000);
</script>

</body>
</html>
